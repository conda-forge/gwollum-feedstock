schema_version: 1

context:
  name: GWOLLUM
  version: 4.1.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://git.ligo.org/virgo/virgoapp/${{ name }}/-/archive/${{ version }}/${{ name }}-${{ version }}.tar.gz
  sha256: e79daa44c811b30bc39f94187693fbfe91edcfa6b7bba1d2453e2374a53db31b
  patches:
    # fix rootcling when cross-compiling
    - if: osx and arm64
      then: rootcling-cross.patch
    # add missing TMath.h include for TMath::Min/Max
    - tmath-include.patch

build:
  number: 11
  skip: win

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - cmake >=3.12.0
    - if: unix
      then:
        - make
        - pkg-config
    - if: osx and arm64
      then: root_base
  host:
    - fftw
    - hdf5
    - libframel 8.42.*
    - root_base
    - root_cxx_standard
  run_exports:
    - ${{ pin_subpackage("gwollum", upper_bound="x") }}

tests:
  - requirements:
      run:
        - pkg-config
    script:
      - if: unix
        then:
          - test -f ${GWOLLUM_DATA}/V1-hrec-vsr2.gwf
          - test -f ${GWOLLUM_PIX}/gwollum.gif
      - pkg-config --print-errors --exact-version ${{ version }} ${{ name|lower }}

about:
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Tools for gravitational-wave analyses
  description: |
    The GWOLLUM package contains a set of software tools designed to perform
    GW analyses.  Most of the code source is written with the C++ language
    and it also heavily relies on the CERN ROOT libraries (also C++).
  homepage: https://virgo.docs.ligo.org/virgoapp/${{ name }}/
  repository: https://git.ligo.org/virgo/virgoapp/${{ name }}.git
  documentation: https://virgo.docs.ligo.org/virgoapp/${{ name }}/

extra:
  recipe-maintainers:
    - duncanmmacleod
    - FlorentRobinet
